<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veomall OS</title>
    <link rel="stylesheet" href="/static/css/win3.css">
    <style>
        .boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            color: #C0C0C0;
            font-family: var(--win-font-mono);
            font-size: 14px;
            padding: 20px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }
        .boot-screen.fade-out { opacity: 0; pointer-events: none; }
        .boot-logo {
            font-size: 18px;
            font-weight: bold;
            color: #FFFFFF;
            margin-bottom: 20px;
            text-align: center;
        }
        .boot-progress {
            width: 300px;
            height: 20px;
            border: 2px solid #808080;
            background: #000;
            position: relative;
            overflow: hidden;
        }
        .boot-progress-fill {
            height: 100%;
            background: #000080;
            width: 0%;
            transition: width 0.3s;
        }
        .boot-text {
            margin-top: 10px;
            font-size: 12px;
            color: #808080;
        }
    </style>
</head>

        <div class="boot-progress"><div class="boot-progress-fill" id="boot-fill"></div></div>
        <div class="boot-text" id="boot-text">Loading system...</div>
